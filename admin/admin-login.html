<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Xstream Panel - Login</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <style>
    body { font-family: 'Inter', sans-serif; background: #0a0c12; }
  </style>
</head>
<body class="min-h-screen flex items-center justify-center p-5 bg-gradient-to-br from-[#0b0e17] to-[#141824]">
  <div class="w-full max-w-md bg-[#11141f]/90 backdrop-blur-sm rounded-2xl shadow-2xl border border-gray-800 p-8">
    <div class="text-center mb-8">
      <i class="fas fa-tv text-5xl text-indigo-500 mb-3"></i>
      <h1 class="text-3xl font-bold bg-gradient-to-r from-indigo-400 to-purple-400 bg-clip-text text-transparent">Xstream Panel</h1>
      <p class="text-gray-400 text-sm mt-1">Sign in to manage your streams</p>
    </div>
    <form id="loginForm">
      <div class="mb-5">
        <label class="block text-gray-300 text-sm font-medium mb-2"><i class="fas fa-user mr-2"></i>Username</label>
        <input type="text" id="username" class="w-full bg-[#1e2130] border border-gray-700 rounded-xl px-4 py-3 text-white focus:outline-none focus:ring-2 focus:ring-indigo-500" placeholder="admin">
      </div>
      <div class="mb-6">
        <label class="block text-gray-300 text-sm font-medium mb-2"><i class="fas fa-lock mr-2"></i>Password</label>
        <input type="password" id="password" class="w-full bg-[#1e2130] border border-gray-700 rounded-xl px-4 py-3 text-white focus:outline-none focus:ring-2 focus:ring-indigo-500" placeholder="••••••••">
      </div>
      <button type="submit" class="w-full bg-indigo-600 hover:bg-indigo-700 transition py-3 rounded-xl font-semibold shadow-lg flex items-center justify-center gap-2">
        <i class="fas fa-sign-in-alt"></i> Sign In to Admin →
      </button>
    </form>
              <footer class="mt-14 pt-6 border-t border-gray-800 text-gray-500 text-sm flex justify-center items-center">
  <div class="text-center">
    Made with <i class="fas fa-heart text-pink-500 text-xs"></i> • Adeel IPTV Panel
  </div>
</footer>
  </div>

  <script src="js/data.js"></script>
  <script>
    document.getElementById('loginForm').addEventListener('submit', (e) => {
      e.preventDefault();
      const username = document.getElementById('username').value;
      const password = document.getElementById('password').value;
      const users = getUsers();
      const user = users.find(u => u.username === username && u.password === password);
      if (user) {
        localStorage.setItem('loggedInUser', JSON.stringify({ id: user.id, username: user.username, role: user.role }));
        window.location.href = '../admin/dashboard.html';
      } else {
        alert('Invalid credentials');
      }
    });
  </script>
  
</body>

</html>
