<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Series - Xstream Panel</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
</head>
<body class="bg-[#0c0f17] text-gray-200">
  <div class="flex flex-col lg:flex-row">
    <!-- Sidebar -->
    <aside class="w-full lg:w-72 bg-[#0b0e16] border-r border-gray-800 lg:min-h-screen p-5 sticky top-0 z-20">
      <div class="flex items-center gap-3 mb-10 px-2">
        <i class="fas fa-play-circle text-2xl text-indigo-500"></i>
        <h2 class="text-2xl font-bold tracking-tight">Xstream<span class="text-indigo-400">Panel</span></h2>
      </div>
      <nav class="space-y-1.5">
        <a href="dashboard.html" class="sidebar-item flex items-center gap-3 px-4 py-3 rounded-xl cursor-pointer transition text-gray-300 hover:bg-[#1a1d2a]"><i class="fas fa-tachometer-alt w-5"></i><span>Dashboard</span></a>
        <a href="users.html" class="sidebar-item flex items-center gap-3 px-4 py-3 rounded-xl cursor-pointer transition text-gray-300 hover:bg-[#1a1d2a]"><i class="fas fa-users w-5"></i><span>Users</span></a>
        <a href="livestreams.html" class="sidebar-item flex items-center gap-3 px-4 py-3 rounded-xl cursor-pointer transition text-gray-300 hover:bg-[#1a1d2a]"><i class="fas fa-broadcast-tower w-5"></i><span>Live Streams</span></a>
        <a href="vod.html" class="sidebar-item flex items-center gap-3 px-4 py-3 rounded-xl cursor-pointer transition text-gray-300 hover:bg-[#1a1d2a]"><i class="fas fa-film w-5"></i><span>VOD Movies</span></a>
        <a href="series.html" class="sidebar-item flex items-center gap-3 px-4 py-3 rounded-xl cursor-pointer transition text-gray-300 hover:bg-[#1a1d2a]"><i class="fas fa-tv w-5"></i><span>Series</span></a>
        <a href="categories.html" class="sidebar-item flex items-center gap-3 px-4 py-3 rounded-xl cursor-pointer transition text-gray-300 hover:bg-[#1a1d2a]"><i class="fas fa-tags w-5"></i><span>Categories</span></a>
        <a href="connections.html" class="sidebar-item flex items-center gap-3 px-4 py-3 rounded-xl cursor-pointer transition text-gray-300 hover:bg-[#1a1d2a]"><i class="fas fa-plug w-5"></i><span>Connections</span></a>
      </nav>
      <div class="mt-10 pt-6 border-t border-gray-800">
        <button id="logoutBtn" class="w-full flex items-center justify-center gap-2 bg-red-500/10 hover:bg-red-500/20 text-red-400 py-2 rounded-xl transition"><i class="fas fa-sign-out-alt"></i> Logout</button>
      </div>
    </aside>

    <!-- Main Content -->
    <main class="flex-1 p-6 lg:p-8 overflow-auto">
      <div id="pageContent" class="max-w-7xl mx-auto"></div>
      <footer class="mt-14 pt-6 border-t border-gray-800 text-gray-500 text-sm flex justify-center items-center">
  <div class="text-center">
    Made with <i class="fas fa-heart text-pink-500 text-xs"></i> • Adeel IPTV Panel
  </div>
</footer>
    </main>
  </div>

  <!-- Modal -->
  <div id="modalRoot" class="fixed inset-0 z-50 flex items-center justify-center p-4 hidden modal-overlay">
    <div id="modalContent" class="bg-[#11141f] rounded-2xl w-full max-w-md border border-gray-700"></div>
  </div>

  <script src="js/data.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/common.js"></script>
  <script>
    const user = checkAuth();

    function renderSeries() {
      const seriesList = getSeries();
      const cats = getSeriesCategories();
      const getCatName = (cid) => cats.find(c => c.id === cid)?.name || 'Unknown';
      let html = `
        <div class="flex justify-between items-center mb-6">
          <div><h2 class="text-2xl font-bold">Series</h2><p class="text-gray-400">Manage TV series collections.</p></div>
          <button id="addSeriesBtn" class="bg-indigo-600 px-5 py-2 rounded-xl flex items-center gap-2"><i class="fas fa-plus"></i> Add Series</button>
        </div>
        <div class="overflow-x-auto">
          <table class="w-full"><thead><tr class="text-left text-gray-400 border-b border-gray-800"><th class="p-3">Title</th><th>Category</th><th>Source URL</th><th>Actions</th> </tr></thead><tbody>
      `;
      seriesList.forEach(s => {
        html += `<tr class="border-b border-gray-800/50">
          <td class="p-3 font-medium">${escapeHtml(s.title)}</td>
          <td class="p-3">${getCatName(s.categoryId)}</td>
          <td class="p-3 text-xs break-all max-w-xs">${escapeHtml(s.sourceUrl)}</td>
          <td class="p-3"><button data-id="${s.id}" class="editSeries text-indigo-400 mr-3"><i class="fas fa-edit"></i></button><button data-id="${s.id}" class="deleteSeries text-red-400"><i class="fas fa-trash"></i></button></td>
        </tr>`;
      });
      html += `</tbody></table></div>`;
      document.getElementById('pageContent').innerHTML = html;

      document.getElementById('addSeriesBtn')?.addEventListener('click', () => showSeriesModal());
      document.querySelectorAll('.editSeries').forEach(btn => btn.addEventListener('click', () => showSeriesModal(parseInt(btn.dataset.id))));
      document.querySelectorAll('.deleteSeries').forEach(btn => btn.addEventListener('click', () => {
        if (confirm("Delete this series?")) deleteEntity(STORAGE_KEYS.series, parseInt(btn.dataset.id), renderSeries);
      }));
    }

    function showSeriesModal(seriesId = null) {
      const seriesList = getSeries();
      const existing = seriesId ? seriesList.find(s => s.id === seriesId) : null;
      const cats = getSeriesCategories();
      const modalHtml = `
        <div class="p-6"><h3 class="text-xl font-bold mb-4">${existing ? 'Edit Series' : 'Add New Series'}</h3>
        <form id="seriesForm"><div class="space-y-4">
          <div><label class="block text-sm mb-1">Title</label><input type="text" id="title" value="${existing ? escapeHtml(existing.title) : ''}" class="w-full bg-[#1e2130] border border-gray-700 rounded-lg px-3 py-2" required></div>
          <div><label class="block text-sm mb-1">Category</label><select id="categoryId" class="w-full bg-[#1e2130] border border-gray-700 rounded-lg px-3 py-2">${cats.map(c => `<option value="${c.id}" ${existing?.categoryId === c.id ? 'selected' : ''}>${escapeHtml(c.name)}</option>`).join('')}</select></div>
          <div><label class="block text-sm mb-1">Source URL</label><input type="text" id="sourceUrl" value="${existing ? escapeHtml(existing.sourceUrl) : ''}" class="w-full bg-[#1e2130] border border-gray-700 rounded-lg px-3 py-2" required></div>
          <div class="flex justify-end gap-3 mt-6"><button type="button" class="cancel-modal-btn px-4 py-2 bg-gray-700 rounded-lg">Cancel</button><button type="submit" class="confirm-modal-btn px-4 py-2 bg-indigo-600 rounded-lg">Save</button></div>
        </div></form></div>
      `;
      openModal(modalHtml);
      const form = document.getElementById('seriesForm');
      form.addEventListener('submit', (e) => {
        e.preventDefault();
        const title = document.getElementById('title').value.trim();
        const categoryId = parseInt(document.getElementById('categoryId').value);
        const sourceUrl = document.getElementById('sourceUrl').value.trim();
        if (!title || !sourceUrl) return alert("All fields required");
        let items = getSeries();
        if (existing) {
          const idx = items.findIndex(i => i.id === seriesId);
          if (idx !== -1) items[idx] = { ...items[idx], title, categoryId, sourceUrl };
        } else {
          items.push({ id: Date.now(), title, categoryId, sourceUrl });
        }
        saveSeries(items);
        closeModal();
        renderSeries();
      });
    }

    renderSeries();
    highlightCurrentPage();
    document.getElementById('logoutBtn').addEventListener('click', logout);
  </script>
</body>
</html>
