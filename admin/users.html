<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Users - Xstream Panel</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
</head>
<body class="bg-[#0c0f17] text-gray-200">
  <div class="flex flex-col lg:flex-row">
    <aside class="w-full lg:w-72 bg-[#0b0e16] border-r border-gray-800 lg:min-h-screen p-5 sticky top-0 z-20">
      <div class="flex items-center gap-3 mb-10 px-2">
        <i class="fas fa-play-circle text-2xl text-indigo-500"></i>
        <h2 class="text-2xl font-bold tracking-tight">Xstream<span class="text-indigo-400">Panel</span></h2>
      </div>
      <nav class="space-y-1.5">
        <a href="dashboard.html" class="sidebar-item flex items-center gap-3 px-4 py-3 rounded-xl cursor-pointer transition text-gray-300 hover:bg-[#1a1d2a]"><i class="fas fa-tachometer-alt w-5"></i><span>Dashboard</span></a>
        <a href="users.html" class="sidebar-item flex items-center gap-3 px-4 py-3 rounded-xl cursor-pointer transition text-gray-300 hover:bg-[#1a1d2a]"><i class="fas fa-users w-5"></i><span>Users</span></a>
        <a href="livestreams.html" class="sidebar-item flex items-center gap-3 px-4 py-3 rounded-xl cursor-pointer transition text-gray-300 hover:bg-[#1a1d2a]"><i class="fas fa-broadcast-tower w-5"></i><span>Live Streams</span></a>
        <a href="vod.html" class="sidebar-item flex items-center gap-3 px-4 py-3 rounded-xl cursor-pointer transition text-gray-300 hover:bg-[#1a1d2a]"><i class="fas fa-film w-5"></i><span>VOD Movies</span></a>
        <a href="series.html" class="sidebar-item flex items-center gap-3 px-4 py-3 rounded-xl cursor-pointer transition text-gray-300 hover:bg-[#1a1d2a]"><i class="fas fa-tv w-5"></i><span>Series</span></a>
        <a href="categories.html" class="sidebar-item flex items-center gap-3 px-4 py-3 rounded-xl cursor-pointer transition text-gray-300 hover:bg-[#1a1d2a]"><i class="fas fa-tags w-5"></i><span>Categories</span></a>
        <a href="connections.html" class="sidebar-item flex items-center gap-3 px-4 py-3 rounded-xl cursor-pointer transition text-gray-300 hover:bg-[#1a1d2a]"><i class="fas fa-plug w-5"></i><span>Connections</span></a>
      </nav>
      <div class="mt-10 pt-6 border-t border-gray-800">
        <button id="logoutBtn" class="w-full flex items-center justify-center gap-2 bg-red-500/10 hover:bg-red-500/20 text-red-400 py-2 rounded-xl transition"><i class="fas fa-sign-out-alt"></i> Logout</button>
      </div>
    </aside>

    <main class="flex-1 p-6 lg:p-8 overflow-auto">
      <div id="pageContent" class="max-w-7xl mx-auto"></div>
           <footer class="mt-14 pt-6 border-t border-gray-800 text-gray-500 text-sm flex justify-center items-center">
  <div class="text-center">
    Made with <i class="fas fa-heart text-pink-500 text-xs"></i> • Adeel IPTV Panel
  </div>
</footer>
    </main>
  </div>

  <div id="modalRoot" class="fixed inset-0 z-50 flex items-center justify-center p-4 hidden modal-overlay"></div>

  <script src="js/data.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/common.js"></script>
  <script>
    const user = checkAuth();

    function renderUsers() {
      const users = getUsers();
      let html = `
        <div class="flex justify-between items-center flex-wrap mb-6">
          <div><h2 class="text-2xl font-bold">Users</h2><p class="text-gray-400">Manage subscribers and administrators.</p></div>
          <button id="addUserBtn" class="bg-indigo-600 hover:bg-indigo-700 px-5 py-2 rounded-xl flex items-center gap-2"><i class="fas fa-plus"></i> Add User</button>
        </div>
        <div class="overflow-x-auto">
          <table class="w-full text-sm">
            <thead class="bg-[#0e111b] rounded-xl"><tr class="text-left text-gray-300"><th class="p-3">USER</th><th class="p-3">ROLE</th><th class="p-3">CONNECTIONS</th><th class="p-3">STATUS</th><th class="p-3">CREATED</th><th class="p-3">ACTIONS</th></tr></thead>
            <tbody>
      `;
      users.forEach(u => {
        html += `<tr class="bg-[#11151f] rounded-xl hover:bg-[#181e2c] transition">
          <td class="p-3 font-medium"><i class="fas fa-user-circle mr-2 text-indigo-400"></i>${escapeHtml(u.username)}</td>
          <td class="p-3 capitalize">${u.role}</td>
          <td class="p-3">${u.connections}</td>
          <td class="p-3"><span class="px-2 py-1 rounded-full text-xs ${u.status === 'active' ? 'bg-green-500/20 text-green-400' : 'bg-red-500/20 text-red-400'}">${u.status}</span></td>
          <td class="p-3">${u.created}</td>
          <td class="p-3"><button data-id="${u.id}" class="edit-user-btn text-indigo-400 hover:text-indigo-300 mr-3"><i class="fas fa-edit"></i></button><button data-id="${u.id}" class="delete-user-btn text-red-400 hover:text-red-300"><i class="fas fa-trash"></i></button></td>
        </tr>`;
      });
      html += `</tbody></table></div>`;
      document.getElementById('pageContent').innerHTML = html;

      document.getElementById('addUserBtn')?.addEventListener('click', () => showUserModal());
      document.querySelectorAll('.edit-user-btn').forEach(btn => btn.addEventListener('click', (e) => showUserModal(parseInt(btn.dataset.id))));
      document.querySelectorAll('.delete-user-btn').forEach(btn => btn.addEventListener('click', (e) => {
        const id = parseInt(btn.dataset.id);
        if (confirm('Delete user?')) deleteUserById(id);
      }));
    }

    function deleteUserById(id) {
      const users = getUsers();
      if (users.find(u => u.id === id)?.username === 'admin') { alert("Cannot delete main admin account."); return; }
      const filtered = users.filter(u => u.id !== id);
      saveUsers(filtered);
      renderUsers();
    }

    function showUserModal(userId = null) {
      const users = getUsers();
      const existing = userId ? users.find(u => u.id === userId) : null;
      const isEdit = !!existing;
      const modalHtml = `
        <div class="p-6"><h3 class="text-xl font-bold mb-4">${isEdit ? 'Edit User' : 'Add New User'}</h3>
        <form id="userFormModal"><div class="space-y-4">
          <div><label class="block text-sm mb-1">Username</label><input type="text" id="modalUsername" value="${isEdit ? escapeHtml(existing.username) : ''}" class="w-full bg-[#1e2130] border border-gray-700 rounded-lg px-3 py-2" required></div>
          <div><label class="block text-sm mb-1">Password ${isEdit ? '(leave blank to keep same)' : ''}</label><input type="password" id="modalPassword" class="w-full bg-[#1e2130] border border-gray-700 rounded-lg px-3 py-2"></div>
          <div><label class="block text-sm mb-1">Role</label><select id="modalRole" class="w-full bg-[#1e2130] border border-gray-700 rounded-lg px-3 py-2"><option value="user" ${existing?.role === 'user' ? 'selected' : ''}>User</option><option value="admin" ${existing?.role === 'admin' ? 'selected' : ''}>Admin</option></select></div>
          <div><label class="block text-sm mb-1">Connections (max allowed)</label><input type="number" id="modalConnections" value="${existing?.connections || 0}" class="w-full bg-[#1e2130] border border-gray-700 rounded-lg px-3 py-2"></div>
          <div><label class="block text-sm mb-1">Status</label><select id="modalStatus" class="w-full bg-[#1e2130] border border-gray-700 rounded-lg px-3 py-2"><option value="active" ${existing?.status === 'active' ? 'selected' : ''}>Active</option><option value="inactive" ${existing?.status === 'inactive' ? 'selected' : ''}>Inactive</option></select></div>
          <div class="flex justify-end gap-3 mt-6"><button type="button" class="cancel-modal-btn px-4 py-2 bg-gray-700 rounded-lg">Cancel</button><button type="submit" class="confirm-modal-btn px-4 py-2 bg-indigo-600 rounded-lg">Save</button></div>
        </div></form></div>
      `;
      openModal(modalHtml);
      const form = document.getElementById('userFormModal');
      form.addEventListener('submit', (e) => {
        e.preventDefault();
        const username = document.getElementById('modalUsername').value.trim();
        const role = document.getElementById('modalRole').value;
        const connections = parseInt(document.getElementById('modalConnections').value);
        const status = document.getElementById('modalStatus').value;
        let password = document.getElementById('modalPassword').value;
        if (!username) return alert("Username required");
        let updatedUsers = [...getUsers()];
        if (isEdit) {
          const idx = updatedUsers.findIndex(u => u.id === userId);
          if (idx !== -1) {
            updatedUsers[idx].username = username;
            updatedUsers[idx].role = role;
            updatedUsers[idx].connections = connections;
            updatedUsers[idx].status = status;
            if (password) updatedUsers[idx].password = password;
          }
        } else {
          if (!password) password = 'changeme';
          const newId = Date.now();
          updatedUsers.push({ id: newId, username, password, role, connections, status, created: new Date().toISOString().slice(0,10) });
        }
        saveUsers(updatedUsers);
        closeModal();
        renderUsers();
      });
    }

    renderUsers();
    highlightCurrentPage();
    document.getElementById('logoutBtn').addEventListener('click', logout);
  </script>
</body>
</html>
